<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - EduDonasi</title>

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- ICON -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <link rel="stylesheet" href="style/profile.css">
</head>

<body>

    <!-- MAIN CONTENT -->
    <main class="main-content">

        <!-- TOPBAR -->
        <header class="topbar">
            <h1>Profil Pengguna</h1>
        </header>

        <!-- PROFILE CARD -->
        <section class="profile-card">

            <div class="profile-header">

    <div class="profile-left">

        <img src="https://fkh.ub.ac.id/wp-content/uploads/2022/08/MakotFKHUB.jpeg" alt="Profile">

        <div>
            <h2>Andi</h2>
            <p>EduDonasi - Donatur Premium</p>
        </div>

    </div>

    <a href="dashboard.html" class="dashboard-btn">
        <i class="fa-solid fa-house"></i>
        Dashboard
    </a>

</div>



            <div class="profile-info">

                <div class="info-box">
                    <label>Email</label>
                    <input type="email" id="email" value="feryn@gmail.com">
                </div>

                <div class="info-box">
                    <label>Nama Lengkap</label>
                    <input type="text" id="text" value="Andi Hermawan">
                </div>

                <div class="info-box">
                    <label>Alamat</label>
                    <textarea id="address">Lengkapi Data</textarea>
                </div>

            </div>

            <div class="button-group">
                <button class="save-btn" id="saveBtn">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Simpan Perubahan
                </button>

                <button class="logout-btn" onclick="window.location.href='index.html'">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    Keluar
                </button>
            </div>


        </section>

    </main>

    <script src="js/profile.js"></script>
</body>

</html>
